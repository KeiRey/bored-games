<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    h1 {
      color: #00ff88;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00ff8855;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    #scoreboard span {
      color: #aaa;
    }

    #scoreboard strong {
      color: #fff;
    }

    canvas {
      border: 2px solid #00ff88;
      border-radius: 4px;
      box-shadow: 0 0 20px #00ff8833;
      background: #111827;
    }

    #controls {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #666;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #overlay.hidden {
      display: none;
    }

    #overlay h2 {
      color: #ff4444;
      font-size: 24px;
    }

    #overlay p {
      color: #ccc;
      font-size: 14px;
    }

    #restartBtn {
      margin-top: 8px;
      padding: 8px 24px;
      background: #00ff88;
      border: none;
      border-radius: 4px;
      color: #0f0f1a;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restartBtn:hover {
      background: #00cc6a;
    }

    #settingsBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 16px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #settingsBtn:hover {
      background: #374151;
    }

    #settingsPanel {
      position: absolute;
      top: 56px;
      right: 12px;
      background: #1a1a2e;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 16px;
      min-width: 220px;
      z-index: 10;
    }

    #settingsPanel.open {
      display: flex;
    }

    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
    }

    .setting-label span {
      color: #00ff88;
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #374151;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00ff88;
      cursor: pointer;
    }

    input[type="number"] {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 4px 8px;
      font-size: 13px;
      width: 70px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: 1px solid #00ff88;
    }

    .setting-btns {
      display: flex;
      gap: 6px;
    }

    .setting-btns button {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .setting-btns button:hover {
      background: #374151;
    }

    .setting-btns button.active {
      background: #00ff88;
      color: #0f0f1a;
      border-color: #00ff88;
    }

    .wrapper {
      position: relative;
      display: inline-block;
    }

    .mobile-controls {
      display: none;
      margin-top: 16px;
      gap: 6px;
    }

    .mobile-controls button {
      width: 52px;
      height: 52px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-controls button:active {
      background: #374151;
    }

    .mobile-row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .mobile-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <h1>SNAKE GAME</h1>

  <div id="scoreboard">
    <span>Score: <strong id="score">0</strong></span>
    <span>High Score: <strong id="highscore">0</strong></span>
  </div>

  <div class="wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="settingsBtn" onclick="toggleSettings()">&#9881;</button>
    <div id="settingsPanel">
      <div class="setting-row">
        <div class="setting-label">
          Kecepatan
          <span id="speedLabel">Sedang</span>
        </div>
        <input type="range" id="speedSlider" min="1" max="5" value="3" oninput="updateSpeedLabel()" />
        <div class="setting-btns">
          <button onclick="setSpeed(1)">Lambat</button>
          <button class="active" onclick="setSpeed(3)">Sedang</button>
          <button onclick="setSpeed(5)">Cepat</button>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">
          Jumlah Buah
          <input type="number" id="fruitCountInput" value="1" min="1" max="10" onchange="applyFruitCount()" />
        </div>
        <div class="setting-btns">
          <button onclick="changeFruitCount(-1)">-</button>
          <button onclick="changeFruitCount(1)">+</button>
        </div>
      </div>
      <button id="restartBtn2" onclick="restartGame()" style="padding:8px;background:#00ff88;border:none;border-radius:4px;color:#0f0f1a;font-weight:bold;cursor:pointer;font-size:13px;">Mulai / Restart</button>
    </div>
    <div id="overlay" class="hidden">
      <h2>GAME OVER</h2>
      <p>Skor Kamu: <strong id="finalScore">0</strong></p>
      <button id="restartBtn" onclick="restartGame()">Main Lagi</button>
    </div>
  </div>

  <div id="controls">
    Gunakan tombol <strong>Arrow Keys</strong> atau <strong>WASD</strong> untuk bergerak
  </div>

  <div class="mobile-controls">
    <div class="mobile-row">
      <button onclick="setDirection('up')">&#9650;</button>
    </div>
    <div class="mobile-row">
      <button onclick="setDirection('left')">&#9664;</button>
      <button onclick="setDirection('down')">&#9660;</button>
      <button onclick="setDirection('right')">&#9654;</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    // Speed mapping: 1=slowest, 5=fastest (ms per tick)
    const SPEED_MAP = { 1: 200, 2: 150, 3: 120, 4: 85, 5: 55 };
    const SPEED_LABELS = { 1: 'Lambat', 2: 'Agak Cepat', 3: 'Sedang', 4: 'Cepat', 5: 'Sangat Cepat' };

    const FRUIT_COLORS = [
      '#ff4444', '#ff8800', '#ffdd00', '#44ff44',
      '#00aaff', '#aa44ff', '#ff44aa', '#ff6688',
      '#44ffaa', '#88ff44'
    ];

    let snake, direction, nextDir, foods, score, gameOver, speed, baseSpeed, interval;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');

    document.getElementById('highscore').textContent = highScore;

    function init() {
      snake = [
        { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }
      ];
      direction = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      document.getElementById('score').textContent = score;
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('settingsPanel').classList.remove('open');
      spawnAllFood();
    }

    function spawnAllFood() {
      const count = parseInt(document.getElementById('fruitCountInput').value) || 1;
      foods = [];
      for (let i = 0; i < count; i++) {
        spawnFood(i);
      }
    }

    function spawnFood(colorIndex) {
      let pos;
      let attempts = 0;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
        attempts++;
      } while (
        (snake.some(s => s.x === pos.x && s.y === pos.y) ||
         foods.some(f => f.x === pos.x && f.y === pos.y)) &&
        attempts < 200
      );
      foods.push({ x: pos.x, y: pos.y, colorIndex: colorIndex % FRUIT_COLORS.length });
    }

    function drawCell(x, y, color, glow) {
      ctx.fillStyle = color;
      if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
      }
      ctx.fillRect(x * GRID + 1, y * GRID + 1, GRID - 2, GRID - 2);
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines (subtle)
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath();
        ctx.moveTo(0, j * GRID);
        ctx.lineTo(canvas.width, j * GRID);
        ctx.stroke();
      }

      // Foods
      foods.forEach(f => {
        drawCell(f.x, f.y, FRUIT_COLORS[f.colorIndex], true);
      });

      // Snake body
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        drawCell(seg.x, seg.y, isHead ? '#00ff88' : '#00cc6a', isHead);
      });
    }

    function update() {
      if (gameOver) return;

      direction = { ...nextDir };

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      // Check food collision
      const eaten = foods.findIndex(f => f.x === head.x && f.y === head.y);
      if (eaten !== -1) {
        score += 10;
        document.getElementById('score').textContent = score;
        // Replace eaten food with new one
        foods.splice(eaten, 1);
        spawnFood(eaten % FRUIT_COLORS.length);
        // Keep snake length (no pop) since food was eaten
        // Speed up every 50 points based on current base speed
        const currentSpeedLevel = parseInt(document.getElementById('speedSlider').value);
        if (score % 50 === 0) {
          const newSpeedLevel = Math.min(5, currentSpeedLevel + 1);
          document.getElementById('speedSlider').value = newSpeedLevel;
          updateSpeedLabel();
          baseSpeed = SPEED_MAP[newSpeedLevel];
          clearInterval(interval);
          interval = setInterval(gameLoop, baseSpeed);
        }
      } else {
        snake.pop();
      }
    }

    function endGame() {
      gameOver = true;
      clearInterval(interval);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        document.getElementById('highscore').textContent = highScore;
      }
      document.getElementById('finalScore').textContent = score;
      document.getElementById('overlay').classList.remove('hidden');
    }

    function gameLoop() {
      update();
      draw();
    }

    function restartGame() {
      clearInterval(interval);
      const level = parseInt(document.getElementById('speedSlider').value);
      baseSpeed = SPEED_MAP[level];
      interval = setInterval(gameLoop, baseSpeed);
      init();
    }

    function setDirection(dir) {
      const dirs = {
        up:    { x: 0,  y: -1 },
        down:  { x: 0,  y: 1  },
        left:  { x: -1, y: 0  },
        right: { x: 1,  y: 0  }
      };
      const d = dirs[dir];
      if (d && !(d.x === -direction.x && d.y === -direction.y)) {
        nextDir = d;
      }
    }

    function toggleSettings() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('open');
    }

    function updateSpeedLabel() {
      const val = document.getElementById('speedSlider').value;
      document.getElementById('speedLabel').textContent = SPEED_LABELS[val];
      // Update button active state
      document.querySelectorAll('.setting-btns button').forEach(b => b.classList.remove('active'));
    }

    function setSpeed(level) {
      document.getElementById('speedSlider').value = level;
      updateSpeedLabel();
    }

    function applyFruitCount() {
      let val = parseInt(document.getElementById('fruitCountInput').value);
      if (isNaN(val) || val < 1) val = 1;
      if (val > 10) val = 10;
      document.getElementById('fruitCountInput').value = val;
    }

    function changeFruitCount(delta) {
      let val = parseInt(document.getElementById('fruitCountInput').value) || 1;
      val += delta;
      if (val < 1) val = 1;
      if (val > 10) val = 10;
      document.getElementById('fruitCountInput').value = val;
    }

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      const map = {
        arrowup: 'up',    w: 'up',
        arrowdown: 'down',  s: 'down',
        arrowleft: 'left',  a: 'left',
        arrowright: 'right', d: 'right'
      };
      if (map[key]) {
        e.preventDefault();
        setDirection(map[key]);
      }
    });

    // Close settings when clicking outside
    document.addEventListener('click', e => {
      const panel = document.getElementById('settingsPanel');
      const btn = document.getElementById('settingsBtn');
      if (panel.classList.contains('open') &&
          !panel.contains(e.target) &&
          !btn.contains(e.target)) {
        panel.classList.remove('open');
      }
    });

    init();
    baseSpeed = SPEED_MAP[parseInt(document.getElementById('speedSlider').value)];
    interval = setInterval(gameLoop, baseSpeed);
  </script>

</body>
</html>
